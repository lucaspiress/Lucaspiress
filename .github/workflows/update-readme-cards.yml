name: Atualizar cards do GitHub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v6

      - name: Gerar card de estatísticas
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: 'username=lucaspiress&show_icons=true'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar card de linguagens
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: 'username=lucaspiress&layout=compact&langs_count=6'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Salvar cards no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git diff --cached --quiet && exit 0
          git commit -m "fix: corrigir cards de estatísticas"
          git push
