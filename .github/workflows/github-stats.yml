name: Atualizar estatísticas do GitHub

on:
  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v6

      - name: Gerar card de estatísticas
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: >-
            username=${{ github.repository_owner }}
            &show_icons=true
            &include_all_commits=true
            &hide_border=true
            &bg_color=0a0a0a
            &title_color=ff2d2d
            &icon_color=ff2d2d
            &text_color=e6e6e6
            &ring_color=ff2d2d
            &locale=pt-br
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar card de linguagens
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: >-
            username=${{ github.repository_owner }}
            &layout=compact
            &langs_count=8
            &hide_border=true
            &bg_color=0a0a0a
            &title_color=ff2d2d
            &text_color=e6e6e6
            &locale=pt-br
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Salvar cards no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "chore: atualizar estatísticas do perfil" || exit 0
          git push
