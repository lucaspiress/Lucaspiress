  </text>

  <text x="270" y="82" class="label">
    SEGUIDORES
  </text>

  <text x="270" y="112" class="value">
    0
  </text>

  <text x="28" y="145" class="label">
    ESTRELAS RECEBIDAS
  </text>

  <text x="28" y="175" class="value">
    0
  </text>

  <text x="270" y="145" class="label">
