<svg
  xmlns="http://www.w3.org/2000/svg"
  width="500"
  height="195"
  viewBox="0 0 500 195"
  role="img"
  aria-label="Estatísticas do GitHub de Lucas Uhlmann Pires"
>
  <rect
    width="499"
    height="194"
    x="0.5"
    y="0.5"
    rx="8"
    fill="#0a0a0a"
    stroke="#2b2b2b"
  />

  <style>
    .title {
      font: 700 22px -apple-system, BlinkMacSystemFont,
